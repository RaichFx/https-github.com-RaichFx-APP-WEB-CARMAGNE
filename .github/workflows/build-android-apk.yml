name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Install Android packaging tools
        run: npm install --no-save @capacitor/cli @capacitor/core @capacitor/android

      - name: Build web app
        run: npm run build

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.ts <<'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.carmagne.instal',
            appName: 'Carmagne',
            webDir: 'dist',
            server: {
              androidScheme: 'https'
            }
          };

          export default config;
          EOF

      - name: Create Android project
        run: npx cap add android

      - name: Generate Android launcher icon
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

          LOGO_FILE="public/logo.png"
          if [ ! -f "$LOGO_FILE" ]; then
            echo "Logo file not found at $LOGO_FILE"
            exit 1
          fi

          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/values

          cat > android/app/src/main/res/values/ic_launcher_background.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#050505</color>
          </resources>
          XML

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML

          for item in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            density="${item%%:*}"
            size="${item##*:}"
            logo_size=$(( size * 72 / 100 ))
            resized="/tmp/icon-${density}.png"
            convert "$LOGO_FILE" -resize "${logo_size}x${logo_size}" "$resized"
            convert -size "${size}x${size}" xc:"#050505" "$resized" -gravity center -composite "android/app/src/main/res/mipmap-${density}/ic_launcher.png"
            cp "android/app/src/main/res/mipmap-${density}/ic_launcher.png" "android/app/src/main/res/mipmap-${density}/ic_launcher_round.png"
          done

          for item in mdpi:108 hdpi:162 xhdpi:216 xxhdpi:324 xxxhdpi:432; do
            density="${item%%:*}"
            size="${item##*:}"
            logo_size=$(( size * 54 / 100 ))
            resized="/tmp/icon-foreground-${density}.png"
            convert "$LOGO_FILE" -resize "${logo_size}x${logo_size}" "$resized"
            convert -size "${size}x${size}" xc:none "$resized" -gravity center -composite "android/app/src/main/res/mipmap-${density}/ic_launcher_foreground.png"
          done

      - name: Sync Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: carmagne-web-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
